<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gul Eda Aydemir | iOS Developer</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(25, 25, 25, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #A1A1A6;
            --accent: #7C3AED;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Animated Glow */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            left: -200px;
            z-index: -1;
            border-radius: 50%;
            animation: pulse 8s infinite alternate;
        }

        .bg-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            right: -150px;
            z-index: -1;
            border-radius: 50%;
            animation: pulse 10s infinite alternate-reverse;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Header / Profile Section */
        .profile-section {
            text-align: center;
            margin-top: 120px;
            margin-bottom: 60px;
            animation: fadeUp 1s ease-out;
        }

        .profile-section h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFF 0%, #A1A1A6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-section p {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Apps Grid */
        .apps-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            padding: 0 20px;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        /* App Card (Glassmorphism) */
        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Card Hover Effect */
        .app-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(124, 58, 237, 0.2);
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: 0.7s;
        }

        .app-card:hover::before {
            left: 150%;
        }

        /* App Icon */
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            object-fit: cover;
            background-color: #1e1e1e;
        }

        .app-info {
            flex: 1;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .app-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            animation: fadeUp 1s ease-out 0.4s both;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .social-links a:hover {
            color: var(--text-main);
        }

        /* Entry Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .profile-section h1 { font-size: 2.2rem; }
            .app-card { flex-direction: column; text-align: center; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="profile-section">
        <h1>Gul Eda Aydemir</h1>
        <p>iOS Developer</p>
    </div>

    <div class="apps-container">
        
        <a href="solo.swipe/" class="app-card">
            <img src="solo.swipe/appicon.png" alt="Solo.Swipe Icon" class="app-icon">
            <div class="app-info">
                <h2 class="app-title">Solo.Swipe</h2>
                <p class="app-desc">Clean your gallery in seconds the fun way. A smart photo organizer that helps you free up storage with simple swipe gestures.</p>
            </div>
        </a>

    </div>

    <footer>
        <p>&copy; 2026 Gul Eda Aydemir. All rights reserved.</p>
        <div class="social-links">
            <a href="https://instagram.com/solo.stasera" target="_blank">Instagram</a>
            <a href="mailto:solostaseraofficial@gmail.com">Get in Touch</a>
        </div>
    </footer>

</body>
</html>
